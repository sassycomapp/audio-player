components: []
container:
  properties:
    html: "<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n  <meta charset=\"UTF-8\">\n  <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n  <title>TTS Audio Player</title>\n  <style>\n    .audio-player {\n      background-color: #333;\n      width: 100%;\n      max-width: 550px;\n      height: 40px;\n      display: flex;\n      align-items: center;\n      gap: 5px;\n      padding: 5px;\n      border-radius: 10px;\n      box-sizing: border-box;\n    }\n\n    .time-container {\n      display: flex;\n      align-items: center;\n      gap: 5px;\n      white-space: nowrap;\n      flex-shrink: 0;\n    }\n\n    .time-display {\n      color: white;\n      font-size: 12px;\n    }\n\n    .play-pause-btn {\n      background-color: transparent;\n      border: none;\n      color: white;\n      font-size: 16px;\n      cursor: pointer;\n      padding: 0;\n      display: flex;\n      align-items: center;\n      justify-content: center;\n      width: 30px;\n      height: 30px;\n      position: relative;\n      flex-shrink: 0;\n    }\n\n    .play-pause-btn::after {\n      content: attr(title);\n      position: absolute;\n      bottom: 100%;\n      left: 50%;\n      transform: translateX(-50%);\n      background-color: rgba(0, 0, 0, 0.8);\n      color: white;\n      padding: 5px 10px;\n      border-radius: 4px;\n      font-size: 12px;\n      white-space: nowrap;\n      opacity: 0;\n      visibility: hidden;\n      transition: opacity 0.3s, visibility 0.3s;\n    }  \n\n    .play-pause-btn:hover::after {\n      opacity: 1;\n      visibility: visible;\n    }\n\n    .slider {\n      -webkit-appearance: none;\n      height: 5px;\n      background: #9d1d83;\n      border-radius: 5px;\n      outline: none;\n      opacity: 0.9;\n      transition: opacity .2s;\n    }\n\n    .slider#time-slider {\n      flex: 1;\n      min-width: 100px;\n    }\n\n    .slider#volume-slider {\n      width: 100%;\n      max-width: 100px;\n    }\n\n    .slider:hover {\n      opacity: 1;\n    }\n\n    .slider::-webkit-slider-thumb,\n    .slider::-moz-range-thumb {\n      width: 10px;\n      height: 10px;\n      border-radius: 50%;\n      background: #9d1d83;\n      cursor: pointer;\n    }\n\n    .volume-container {\n      display: flex;\n      align-items: center;\n      flex-shrink: 1;\n      min-width: 40px;\n      max-width: 120px;\n      width: 120px;\n    }\n\n    .slider-icon {\n      color: white;\n      font-size: 16px;\n      margin-right: 5px;\n      flex-shrink: 0;\n    }\n  </style>\n</head>\n<body>\n  <div class=\"audio-player\">\n    <div class=\"time-container\">\n      <span class=\"time-display\" id=\"current-time\">00:00</span>\n      <span class=\"time-display\" id=\"total-time\">/ 00:00</span>\n    </div>\n    <button class=\"play-pause-btn\" id=\"play-pause-btn\" title=\"Double click to load media from your PC\">▶️</button>\n    <input type=\"range\" class=\"slider\" id=\"time-slider\" min=\"0\" value=\"0\" step=\"1\">\n    <div class=\"volume-container\">\n      <span class=\"slider-icon\">🔊</span>\n      <input type=\"range\" class=\"slider\" id=\"volume-slider\" min=\"0\" max=\"1\" step=\"0.01\" value=\"0.5\">\n    </div>\n    <input type=\"file\" id=\"file-input\" accept=\"audio/*\" style=\"display:none;\" />\n  </div>\n\n  <!-- Audio Player Initialization Script -->\n  <script>\n    // Function to attach event listeners (now moved to the root scope)\n    function attachEventListeners(audio, playPauseButton, currentTimeDisplay, timeSlider, volumeSlider, fileInput, totalTimeDisplay) {\n      // Play/Pause button logic\n      playPauseButton.addEventListener('click', () => {\n        if (audio.paused || audio.ended) {\n          audio.play().catch(error => console.log(\"Audio play interrupted: \" + error));\n          playPauseButton.textContent = '⏸️';\n        } else {\n          audio.pause();\n          playPauseButton.textContent = '▶️';\n        }\n      });\n\n      // Time update logic\n      audio.addEventListener('timeupdate', () => {\n        currentTimeDisplay.textContent = formatTime(audio.currentTime);\n        timeSlider.value = Math.floor(audio.currentTime);\n      });\n\n      // Time slider input handling\n      timeSlider.addEventListener('input', () => {\n        audio.currentTime = timeSlider.value;\n      });\n\n      // Volume slider input handling\n      volumeSlider.addEventListener('input', () => {\n        audio.volume = volumeSlider.value;\n      });\n\n      // File input handling\n      fileInput.addEventListener('change', (event) => {\n        const file = event.target.files[0];\n        if (file) {\n          const fileURL = URL.createObjectURL(file);\n          audio.src = fileURL;\n          audio.load();\n          audio.addEventListener('loadedmetadata', () => {\n            totalTimeDisplay.textContent = ` / ${formatTime(audio.duration)}`;\n            timeSlider.max = Math.floor(audio.duration);\n          });\n        }\n      });\n    }\n\n    // Format time function (also moved to the root scope)\n    function formatTime(seconds) {\n      const minutes = Math.floor(seconds / 60);\n      const remainingSeconds = Math.floor(seconds % 60);\n      return `${minutes}:${remainingSeconds < 10 ? '0' : ''}${remainingSeconds}`;\n    }\n\n    if (!window.audioPlayerInitialized) {\n      window.audioPlayerInitialized = true;  // Ensure initialization happens only once\n\n      const playPauseButton = document.getElementById('play-pause-btn');\n      const currentTimeDisplay = document.getElementById('current-time');\n      const totalTimeDisplay = document.getElementById('total-time');\n      const timeSlider = document.getElementById('time-slider');\n      const volumeSlider = document.getElementById('volume-slider');\n      const fileInput = document.getElementById('file-input');\n\n      let audio = new Audio();\n      audio.volume = 0.5;\n      volumeSlider.value = 0.5;\n\n      // Store the audio object globally for re-use\n      window.audio = audio;\n\n      // Attach all necessary event listeners\n      attachEventListeners(audio, playPauseButton, currentTimeDisplay, timeSlider, volumeSlider, fileInput, totalTimeDisplay);\n\n      window.addEventListener('offline', () => {\n        alert('Network connection lost.');\n      });\n\n      window.addEventListener('online', () => {\n        alert('Network connection restored.');\n      });\n\n//      alert(\"Audio Player Initialized.\");\n    } else {\n//      alert(\"Audio Player already initialized, skipping re-initialization.\");\n    }\n\n    // Double-click to load file from PC\n    document.getElementById('play-pause-btn').addEventListener('dblclick', () => {\n      document.getElementById('file-input').click();\n    });\n  </script>\n\n  <!-- Reattach Event Listeners Script -->\n  <script>\n    window.reattachAudioPlayerListeners = function() {\n//      alert(\"Reattaching event listeners to the existing audio player...\");\n\n      const playPauseButton = document.getElementById('play-pause-btn');\n      const currentTimeDisplay = document.getElementById('current-time');\n      const totalTimeDisplay = document.getElementById('total-time');\n      const timeSlider = document.getElementById('time-slider');\n      const volumeSlider = document.getElementById('volume-slider');\n      const fileInput = document.getElementById('file-input');\n\n      const audio = window.audio;  // Use the globally stored audio object\n\n      if (audio) {\n        // Reattach the event listeners\n        attachEventListeners(audio, playPauseButton, currentTimeDisplay, timeSlider, volumeSlider, fileInput, totalTimeDisplay);\n//        alert(\"Event listeners reattached. Audio player should now be functional.\");\n      } else {\n        alert(\"Error: Audio object is not found.\");\n      }\n    }\n  </script>\n\n  <!-- Audio Player State Check Script -->\n  <script>\n    window.checkAudioPlayerState = function() {\n      if (window.audioPlayerInitialized) {\n//        alert(\"Audio player is initialized and ready.\");\n      } else {\n//        alert(\"Audio player is NOT initialized.\");\n      }\n    }\n\n    // Call the state check function to verify initialization\n    window.checkAudioPlayerState();\n  </script>\n</body>\n</html>\n"
  type: HtmlTemplate
custom_component: true
events:
- {default_event: true, description: Triggered when the audio starts playing., name: play}
- {description: Triggered when the audio is paused., name: pause}
- description: Triggered periodically while the audio is playing, providing updates on the current playback time.
  name: time_update
  parameters:
  - {description: Current time in secods, name: current_time__number_}
- {description: Triggered when the audio playback has finished., name: ended}
- description: Triggered when the audio volume is changed.
  name: volume_change
  parameters:
  - {description: New volume level (0 to 100), name: volume__number_}
  - {description: Whether the audio is muted, name: muted__boolean_}
- description: Triggered after a user has moved the progress bar to seek a different part of the audio.
  name: seeked
  parameters:
  - {description: New playback position in seconds, name: current_time__number_}
- description: Triggered when an error occurs during audio playback.
  name: error
  parameters:
  - {description: Description of the error, name: error_message__string_}
- description: Triggered when metadata (like duration) is loaded for the audio file.
  name: loaded_metadata
  parameters:
  - {description: Total duration of the audio in seconds, name: duration__number_}
- {description: Triggered when the audio is muted., name: mute}
- {description: Triggered when the audio is unmuted., name: unmute}
is_package: true
properties:
- {default_binding_prop: true, default_value: '', description: The URL or path of the audio file to be played., important: true, name: source, type: string}
- {default_value: false, description: Automatically start playing the audio when loaded., important: true, name: auto_play, type: boolean}
- {default_value: false, description: Whether the audio should loop continuously., important: true, name: loop, type: boolean}
- {default_value: 50, description: Initial volume level of the audio player (0 to 100)., important: true, name: volume, type: number}
- {default_value: false, description: Whether the audio should start muted., important: true, name: mute, type: boolean}
- {default_value: 0, description: Current playback time of the audio in seconds., important: true, name: current_time, type: number}
- {default_value: 0, description: Total duration of the audio file in seconds (read-only)., important: true, name: duration, type: number}
- {default_value: true, description: 'Show or hide playback controls (play/pause, volume, etc.).', important: true, name: show_controls, type: boolean}
- {default_value: 1, description: Speed at which the audio is played (1 is normal speed), important: true, name: playback_rate, type: number}
- {default_value: '#FFD700', description: Colour for the progress bar and volume slider., important: true, name: theme_color, type: string}
